name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1

      - uses: actions/cache@v5
        with:
          path: |
            ~/.elm
            review/elm-stuff
            cli/review/elm-stuff
          key: elm-review-${{ runner.os }}-${{ hashFiles('review/elm.json', 'cli/review/elm.json') }}
          restore-keys: |
            elm-review-${{ runner.os }}-

      - uses: actions/cache@v5
        id: cache-elm-format
        with:
          path: ~/.npm-global
          key: npm-global-elm-format-0.8.7

      - name: Configure npm global prefix
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - if: steps.cache-elm-format.outputs.cache-hit != 'true'
        run: npm install -g elm-format@0.8.7

      - name: Format check
        run: elm-format src/ cli/src/ --validate

      - uses: extractions/setup-just@v3

      - name: TODO/OpenAPI sync check
        run: just todo-check

      - name: Review SDK
        run: npx elm-review

      - name: Review CLI
        working-directory: cli
        run: npx --yes elm-review

  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1

      - uses: actions/cache@v5
        with:
          path: |
            elm-stuff
            cli/elm-stuff
            ~/.elm
          key: elm-${{ runner.os }}-${{ hashFiles('elm.json', 'cli/elm.json') }}
          restore-keys: |
            elm-${{ runner.os }}-

      - name: Compile CLI
        run: |
          cd cli
          elm make src/Cli/Main.elm --optimize --output=dist/elm.js
          elm make src/Cli/TestMain.elm --optimize --output=dist/elm-test.js

      - uses: actions/upload-artifact@v7
        with:
          name: cli-dist
          path: |
            cli/dist/elm.js
            cli/dist/elm-test.js
          retention-days: 1

  test:
    name: Integration tests
    needs: compile
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    env:
      CORTEX_TENANT_URL: ${{ secrets.CORTEX_TENANT_URL }}
      CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
      CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - uses: actions/cache@v5
        id: cache-bats
        with:
          path: ~/.npm-global
          key: npm-global-bats-${{ runner.os }}

      - name: Configure npm global prefix
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - if: steps.cache-bats.outputs.cache-hit != 'true'
        run: npm install -g bats

      - uses: actions/download-artifact@v8
        with:
          name: cli-dist
          path: cli/dist

      - name: Reap orphaned test fixtures (pre)
        run: ./cli/bin/cortex-test-clean

      - name: Run BATS tests
        run: |
          BATS_RUN_ID="$(date +%s)_$(openssl rand -hex 2)" \
            bats --jobs 8 tests/*.bats

      - name: Reap orphaned test fixtures (post)
        if: always()
        run: ./cli/bin/cortex-test-clean
