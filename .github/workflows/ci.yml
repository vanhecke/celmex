name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g elm-format@0.8.7

      - name: Check formatting
        run: elm-format src/ cli/src/ --validate

  review:
    name: elm-review
    needs: format
    runs-on: ubuntu-latest
    # TODO: remove continue-on-error once the initial elm-review backlog
    # is cleaned up (see QUALITY_TOOLING_PLAN.md Tier 1).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.elm
            review/elm-stuff
            cli/review/elm-stuff
          key: elm-review-${{ runner.os }}-${{ hashFiles('review/elm.json', 'cli/review/elm.json') }}
          restore-keys: |
            elm-review-${{ runner.os }}-

      - name: Review SDK
        run: npx --yes elm-review

      - name: Review CLI
        working-directory: cli
        run: npx --yes elm-review

  compile:
    name: Compile
    needs: [format, review]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1

      - uses: actions/cache@v4
        with:
          path: |
            elm-stuff
            cli/elm-stuff
            ~/.elm
          key: elm-${{ runner.os }}-${{ hashFiles('elm.json', 'cli/elm.json') }}
          restore-keys: |
            elm-${{ runner.os }}-

      - name: Compile CLI
        run: |
          cd cli
          elm make src/Cli/Main.elm --optimize --output=dist/elm.js
          elm make src/Cli/TestMain.elm --optimize --output=dist/elm-test.js

      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: |
            cli/dist/elm.js
            cli/dist/elm-test.js
          retention-days: 1

  test:
    name: Integration tests
    needs: compile
    runs-on: ubuntu-latest
    env:
      CORTEX_TENANT_URL: ${{ secrets.CORTEX_TENANT_URL }}
      CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
      CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - run: npm install -g bats

      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: cli/dist

      - name: Run BATS tests
        run: bats --jobs 4 tests/
