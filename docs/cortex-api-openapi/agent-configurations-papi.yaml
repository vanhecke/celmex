      type: apiKey
      name: Authorization
      in: header
      description: The API key.
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response returned when a request fails.
      properties:
        reply:
          type: object
          description: Error details container.
          example:
            err_code: 500
            err_msg: Internal server error
            err_extra: Additional error context
          properties:
            err_code:
              type: integer
              description: Numeric error code identifying the type of error.
              example: 500
            err_msg:
              type: string
              description: Human-readable error message describing what went wrong.
              example: Internal server error
            err_extra:
              type: string
              description: 'Additional context about the error, if available.'
              example: Additional error context
      x-stoplight:
        id: oxk2labn9tvp4
    BaseResponse:
      type: object
      description: Standard success response for configuration update operations.
