tags:
  - name: Assignment
    description: APIs for managing report assignments
  - name: Comments
    description: APIs for managing report comments
  - name: Reports
    description: APIs for retrieving MTH/MDR reports
  - name: Status
    description: APIs for updating report status
components:
  securitySchemes:
    Authorization:
      type: apiKey
      name: Authorization
      in: header
      description: API Key for authentication
    x-xdr-auth-id:
      type: apiKey
      name: x-xdr-auth-id
      in: header
      description: API Key ID for authentication
  responses:
    BadRequest:
      description: Bad Request - Invalid parameters or missing required fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    Unauthorized:
      description: Unauthorized - Invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    Forbidden:
      description: Forbidden - Tenant not authorized for this endpoint
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
  schemas:
    AddCommentRequestData:
      type: object
      required:
        - xsoar_source_id
        - comment_text
        - comment_created_by
      properties:
        xsoar_source_id:
          type: string
          description: The unique identifier of the report to comment on
        comment_text:
          type: string
          maxLength: 2048
          description: The text content of the comment
        comment_created_by:
          type: string
          description: Email or username of the comment author (not validated)
        attachment_path:
          type: string
          description: Path to attachment
        extract_zip_file:
          type: string
          description: Whether to extract zip file
      x-stoplight:
        id: wbop01t19i9sn
    GetCommentsRequestData:
      type: object
      description: Include either `xsoar_source_id` or the combination of `start_time` and `end_time` in the request.
      properties:
        xsoar_source_id:
          type: string
          description: The unique identifier of the report
        start_time:
          type: integer
          format: int64
          description: Start timestamp in milliseconds (epoch)
        end_time:
          type: integer
          format: int64
          description: End timestamp in milliseconds (epoch)
      x-stoplight:
        id: 28mpo2ukmtv1s
    UpdateStatusRequestData:
      description: Update the report status.
      type: object
      required:
        - xsoar_source_id
        - report_status
      properties:
        xsoar_source_id:
          type: string
          description: The unique identifier of the report
        report_status:
          type: string
          enum:
            - New
            - In Progress
            - Pending
            - Resolved
            - Closed
          description: New status for the report. Must include only one of the supported status values.
      x-stoplight:
        id: x920x6u6lczkg
    UpdateAssignmentRequestData:
      type: object
      required:
        - xsoar_source_id
      properties:
        xsoar_source_id:
          type: string
          description: The unique identifier of the report.
        user:
          type: string
          description: User identifier (email). This parameter is not validated.
        username:
          type: string
          description: Display name of the user.
      x-stoplight:
        id: b9fof1ajj7crt
    GetReportsBySourceIdRequestData:
      description: Retrieves source_id for one or more MTH/MDR reports.
      type: object
      properties:
        request_data:
          type: object
          required:
            - xsoar_source_ids
          properties:
            xsoar_source_ids:
              type: array
              items:
                type: string
              description: List of source IDs to retrieve
      x-stoplight:
        id: 3ihxeknpp9alf
    GetReportsByIncidentIdRequestData:
      description: Retrieves incident_id for one or more MTH/MDR reports.
      type: object
      properties:
        request_data:
          type: object
          required:
            - incident_ids
          properties:
            incident_ids:
              type: array
              items:
                type: string
              description: List of incident IDs to retrieve
      x-stoplight:
        id: xgh8xyx7je8kz
    AddCommentResponse:
      type: object
      properties:
        reply:
          type: boolean
          description: Indicates if the comment was added successfully
      x-stoplight:
        id: euo97ms4liozx
    GetCommentsResponse:
      description: ''
      type: object
      properties:
        reply:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: boolean
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
      x-stoplight:
        id: w4sh0pvquelw8
    UpdateStatusResponse:
      type: object
      properties:
        reply:
          $ref: '#/components/schemas/ReportUpperCase'
      x-stoplight:
        id: an5h3ieuhwdmp
    UpdateAssignmentResponse:
      type: object
      properties:
        reply:
          type: object
          properties:
            success:
              type: boolean
              description: Indicates if the assignment was successful
            xsoar_source_id:
              type: string
              description: The source ID of the report
            assigned_user:
              type: string
              description: Email of the assigned user
      x-stoplight:
        id: y09l921gdhtzf
    GetReportsResponse:
      type: object
      properties:
        reply:
          type: array
          items:
            $ref: '#/components/schemas/Report'
      x-stoplight:
        id: 5r8nx1hf30rrn
    Report:
      type: object
      description: MTH/MDR Report object
