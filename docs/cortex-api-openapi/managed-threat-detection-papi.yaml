      tags:
        - Comments
      x-stoplight:
        id: 9qrv0fvpkippx
  /public_api/v1/mth/child/report/update/status:
    post:
      summary: Update report status
      operationId: postUpdateReportStatus
      description: |-
        Updates the status of an MTH/MDR report.

        **Validation Rules:**
        - If the specified source_id cannot be found, a generic error response is returned.
      parameters:
        - schema:
            type: string
            example: UCoWpG4rkNzgCp2dsh8m02iVpZsskwKHz7N1tErPcUV3Wmf59Gc9kytmgOv0pDWoem3PBlORyRIPiir4OcYdWUOWAM3JyTgoCxQf4nQoTlKmFRKz9Bj5vIjluw66p9WP
          in: header
          name: Authorization
          description: '{api_key}'
          required: true
        - schema:
            type: string
            example: '241'
          in: header
          name: x-xdr-auth-id
          description: '{api_key_id}'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequestData'
            examples:
              Example 1:
                value:
                  xsoar_source_id: '777776'
                  report_status: In Progress
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStatusResponse'
              examples:
                Example 1:
                  value:
                    reply:
                      XSOAR_SOURCE_ID: '777776'
                      NAME: 'Royi test 2025-11-18 14:27:18.299620'
                      DESCRIPTION: Royi
                      CREATED_BY: Roei
                      INSERT_TIME: 1763468832000
                      UPDATE_TIME: 1763907713000
                      ATTACHMENTS: '{"update_report/1763468839243-sample.pdf-d0bc29ba-2b46-46b7-94d6-24826da2c82b": {"attachment_name": "sample.pdf", "attachment_size": 55483}}'
                      INCIDENT_ID: null
                      REPORT_TYPE: Cyber Hygiene Report
                      SEVERITY: SEV_020_LOW
                      COMMENTS: null
                      CLASSIFICATION: MTH
                      ASSIGNED_USER: iavron@paloaltonetworks.com
                      ASSIGNED_USER_PRETTY: iavron iavron
                      REPORT_STATUS: IN_PROGRESS
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Status
      x-stoplight:
        id: 077bbpipie2ja
  /public_api/v1/mth/child/report/update/assign:
    post:
      summary: Update report assignment
      operationId: postUpdateReportAssignment
      description: |2-


         Assigns a user to an MTH/MDR report.

        **Validation Rules:**
        - The `user` parameter is validated based on the tenant context; the `username` parameter is not validated
        - If the specified source_id is not found, a generic error response is returned.
      parameters:
        - schema:
            type: string
            example: UCoWpG4rkNzgCp2dsh8m02iVpZsskwKHz7N1tErPcUV3Wmf59Gc9kytmgOv0pDWoem3PBlORyRIPiir4OcYdWUOWAM3JyTgoCxQf4nQoTlKmFRKz9Bj5vIjluw66p9WP
          in: header
          name: Authorization
          description: '{api_key}'
          required: true
        - schema:
            type: string
            example: '241'
          in: header
          name: x-xdr-auth-id
          description: '{api_key_id}'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssignmentRequestData'
            examples:
              Example 1:
                value:
                  xsoar_source_id: '777774'
                  user: analyst@company.com
                  username: Motti Analysto
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAssignmentResponse'
              examples:
                Example 1:
                  value:
                    reply:
                      success: true
                      xsoar_source_id: '777774'
                      assigned_user: analyst@company.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Assignment
      x-stoplight:
        id: qna9avvs87ba1
  /public_api/v1/mth/child/get_reports_by_source_id:
