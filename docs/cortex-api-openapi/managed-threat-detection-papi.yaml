openapi: 3.0.0
x-stoplight:
  id: pdcziof72gk0x
info:
  version: 1.0.0
  title: Managed Services APIs
  description: |-
    Public endpoints are provided for MTH (Managed Threat Hunting) and MDR (Managed Detection and Response) child tenants to manage reports, comments, and assignment-related operations.

    ## Authentication
    All endpoints require API key based authentication using the x-xdr-auth-id and Authorization headers.

    ## Supported Tenants
    Access is limited to MTH Child and MDR Child tenants only.

    ## Timestamps
    All timestamps must be in milliseconds since the Unix epoch (UTC).
    **Required licenses:** MDR, MTH, Managed XSIAM Pro, Managed XSIAM Premium.
  contact:
    email: docs-cortex@paloaltonetworks.com
    name: Cortex Documentation Team
    url: 'https://docs-cortex.paloaltonetworks.com/'
  license:
    name: Proprietary
    url: 'https://www.paloaltonetworks.com/legal'
servers:
  - url: 'https://api-yourfqdn'
    description: ''
security: []
paths:
  /public_api/v1/mth/child/add_comment:
    post:
      summary: Add a comment to an MTH/MDR report
      operationId: postAddComment
      description: |-
        Adds a new comment to an MTH/MDR report from a child tenant.

        **Notes:**
        - If the source_id is not found, a generic error response is returned.
      parameters:
        - schema:
            type: string
            example: UCoWpG4rkNzgCp2dsh8m02iVpZsskwKHz7N1tErPcUV3Wmf59Gc9kytmgOv0pDWoem3PBlORyRIPiir4OcYdWUOWAM3JyTgoCxQf4nQoTlKmFRKz9Bj5vIjluw66p9WP
          in: header
          name: Authorization
          description: '{api_key}'
          required: true
        - schema:
            type: string
            example: '241'
          in: header
          name: x-xdr-auth-id
          description: '{api_key_id}'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequestData'
            examples:
              Example 1:
                value:
                  xsoar_source_id: '777771'
                  comment_text: Investigation completed. No malicious activity found.
                  comment_created_by: analyst@company.com
                  attachment_path: comment/investigation-report-1234567890.pdf
                  extract_zip_file: 'false'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddCommentResponse'
              examples:
                Example 1:
                  value:
                    reply: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Comments
      x-stoplight:
        id: hip5it578xr6a
  /public_api/v1/mth/child/get_comments:
    post:
      summary: Get comments for MTH/MDR reports
      operationId: postGetComments
      description: |-
        Retrieves comments for a specific report or for all comments within a specified time range.

        **Validation Rules:**
        - The request requires either the `xsoar_source_id` parameter or the combination of `start_time` and `end_time` parameters.
        - At least one search criteria must be provided
      parameters:
        - schema:
            type: string
            example: UCoWpG4rkNzgCp2dsh8m02iVpZsskwKHz7N1tErPcUV3Wmf59Gc9kytmgOv0pDWoem3PBlORyRIPiir4OcYdWUOWAM3JyTgoCxQf4nQoTlKmFRKz9Bj5vIjluw66p9WP
          in: header
          name: Authorization
          description: '{api_key}'
          required: true
        - schema:
            type: string
            example: '241'
          in: header
          name: x-xdr-auth-id
          description: '{api_key_id}'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCommentsRequestData'
            examples:
              Get comments by report ID:
                value:
                  xsoar_source_id: '777772'
              Get comments by time range:
                value:
                  start_time: 1764517583000
                  end_time: 1764512583000
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCommentsResponse'
              examples:
                Example 1:
                  value:
                    reply:
                      '9998546484426':
                        status: true
                        data:
                          - comment_id: 7
                            comment_created_by: stam_updated_user
                            comment_author_type: 0
                            comment_insert_time: 1763468552000
                            comment_update_time: 1763468849000
                            comment_text: 'Update comment stam2025-11-18 14:27:28.123680'
                            comment_attachments: []
                            xsoar_source_id: '777771'
                            comment_username: Managed Threat Hunting
                          - comment_id: 8
                            comment_created_by: stam_user
                            comment_author_type: 0
                            comment_insert_time: 1763468560000
                            comment_update_time: null
                            comment_text: 'stam comment_2025-11-18 14:22:39.114626'
                            comment_attachments: []
                            xsoar_source_id: '777771'
                            comment_username: Managed Threat Hunting
                          - comment_id: 21
                            comment_created_by: random_user
                            comment_author_type: 0
                            comment_insert_time: 1763468843000
                            comment_update_time: null
                            comment_text: 'stam comment_2025-11-18 14:27:22.608768'
                            comment_attachments: []
                            xsoar_source_id: '777771'
                            comment_username: analyst@company.com
                          - comment_id: 34
                            comment_created_by: iavron iavron
                            comment_author_type: 1
                            comment_insert_time: 1764235743000
                            comment_update_time: null
                            comment_text: Attachment test
                            comment_attachments:
                              - 'https://qa2-test-9998546484426-papi.storage.googleapis.com/comment/Screenshot%202025-11-27%20at%2010.34.50.png-1764235743000?Expires=1765122615&GoogleAccessId=api-pod%40qa2-test-9998546484426.iam.gserviceaccount.com&Signature=ku3dHGq8exMve3Hs25iKjDG64ZKqrNPfkCc4G8Njk2hv9aWKnhFqBDC5viMxcZRVMR8EtI7%2BZ7fciRrC7Dsq6n3j0o1TFOsT0VvHgHhb0g1mfm%2B%2FdLYXEe50y2BjmAI2OQiSFFUSuZ5vZomY8QYFpf8i5GMQL5eP%2BJuo4%2Fo7IRfd%2F93vt6FyNuUxkWydAy%2B2tWRCSWHrxC9Drz8BL6tnJubx2n%2BrlEO1YewNMvm6PQ4xDy88GaQvJ4TNmTa44S8HEtOT%2B4ra95yBT3nxvg7Wz5d4El0fUx%2F7nTD3Cfl4FmUPQr5ujTSMDnpN0tN3l9o8HZAOh4abjURdY9UHK6898w%3D%3D'
                            xsoar_source_id: '484485'
                            comment_username: iavron@paloaltonetworks.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
